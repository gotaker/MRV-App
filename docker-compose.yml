services:
  mongo:
    image: mongo:8
    container_name: mrv-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
      - ./seeds/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--username", "${MONGO_USER}", "--password", "${MONGO_PASSWORD}", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-express:
    image: mongo-express:1
    container_name: mrv-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: mrv-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set download local/${MINIO_BUCKET} || true;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mrv-mailhog
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mrv-api
    env_file: .env
    environment:
      NODE_ENV: development
      # Connection string consumed by NestJS
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin"
      S3_ENDPOINT: "http://minio:9000"
      S3_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api:/usr/src/app
      - api_node_modules:/usr/src/app/node_modules
    command: ["npm", "run", "start:dev"]
    depends_on:
      mongo:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: mrv-web
    environment:
      API_BASE_URL: "http://api:3000"
      NODE_ENV: development
    ports:
      - "4200:4200"
    volumes:
      - ./apps/web:/usr/src/app
      - web_node_modules:/usr/src/app/node_modules
    command: ["npm", "run", "start"]
    depends_on:
      - api

  caddy:
    image: caddy:2
    container_name: mrv-caddy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    depends_on:
      - web
      - api

volumes:
  mongo-data:
  minio-data:
  web_node_modules:
  api_node_modules: